replicaCount: 1

service:
  type: NodePort
  http:
    enabled: true
    servicePort: 80
    containerPort: 9080
  tls:
    enabled: true
    servicePort: 443
    containerPort: 9443
  extraPorts:
    - name: prometheus
      port: 9091
      targetPort: 9091
      protocol: TCP

apisix:
  deployment:
    mode: standalone
    role: data_plane
    role_traditional:
      config_provider: yaml
    standalone:
      config: |
        routes:
          - id: 1
            name: api-health
            uri: /health
            host: api.taxonlineai.com
            upstream_id: 1

          - id: 2
            name: api-ready
            uri: /ready
            host: api.taxonlineai.com
            upstream_id: 1

          - id: 3
            name: api-v2
            uri: /api/v2/*
            host: api.taxonlineai.com
            upstream_id: 1
            plugins:
              forward-auth:
                uri: "http://tol-auth.auth.svc.cluster.local:8002/auth/verify"
                request_headers: ["Authorization"]
                upstream_headers: ["X-User-ID","X-User-Role","X-User-Plan"]
              limit-count:
                count: 1000
                time_window: 3600
                key_type: var
                key: remote_addr
                rejected_code: 429
                rejected_msg: '{"error":"rate limit exceeded"}'
              prometheus:
                prefer_name: true

          - id: 10
            name: rag-v2-chat
            uri: /api/v2/chat*
            host: rag.taxonlineai.com
            upstream_id: 1
            plugins:
              forward-auth:
                uri: "http://tol-auth.auth.svc.cluster.local:8002/auth/verify"
                request_headers: ["Authorization"]
                upstream_headers: ["X-User-ID","X-User-Role","X-User-Plan"]
              limit-count:
                count: 1000
                time_window: 3600
                key_type: var
                key: remote_addr
                rejected_code: 429
                rejected_msg: '{"error":"rate limit exceeded"}'
              prometheus:
                prefer_name: true

          - id: 20
            name: auth-login
            uri: /api/auth/login
            methods: ["POST"]
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 2

          - id: 23
            name: auth-oidc
            uri: /api/auth/oidc/*
            methods: ["GET","POST"]
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 2

          - id: 24
            name: auth-logout
            uri: /api/auth/logout
            methods: ["POST","GET"]
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 2

          - id: 21
            name: auth-me
            uri: /api/auth/me
            methods: ["GET"]
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 2
            plugins:
              forward-auth:
                uri: "http://tol-auth.auth.svc.cluster.local:8002/auth/verify"
                request_headers: ["Authorization"]
                upstream_headers: ["X-User-ID","X-User-Role","X-User-Plan"]

          - id: 22
            name: auth-users
            uri: /api/auth/users*
            methods: ["GET","POST","PUT","DELETE"]
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 2
            plugins:
              forward-auth:
                uri: "http://tol-auth.auth.svc.cluster.local:8002/auth/verify"
                request_headers: ["Authorization"]
                upstream_headers: ["X-User-ID","X-User-Role","X-User-Plan"]

          - id: 30
            name: ingestion-api
            uri: /api/v2/ingestion/*
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 3
            plugins:
              forward-auth:
                uri: "http://tol-auth.auth.svc.cluster.local:8002/auth/verify"
                request_headers: ["Authorization"]
                upstream_headers: ["X-User-ID","X-User-Role","X-User-Plan"]

          - id: 32
            name: ingestion-ws
            uri: /ws/*
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 3
            enable_websocket: true

          - id: 40
            name: backend-monitoring
            uri: /api/monitoring/*
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 4
            plugins:
              forward-auth:
                uri: "http://tol-auth.auth.svc.cluster.local:8002/auth/verify"
                request_headers: ["Authorization"]
                upstream_headers: ["X-User-ID","X-User-Role","X-User-Plan"]

          - id: 41
            name: backend-metrics
            uri: /api/metrics/*
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 4
            plugins:
              forward-auth:
                uri: "http://tol-auth.auth.svc.cluster.local:8002/auth/verify"
                request_headers: ["Authorization"]
                upstream_headers: ["X-User-ID","X-User-Role","X-User-Plan"]

          - id: 42
            name: backend-analytics
            uri: /api/analytics/*
            hosts:
              - api.taxonlineai.com
              - rag.taxonlineai.com
            upstream_id: 4
            plugins:
              forward-auth:
                uri: "http://tol-auth.auth.svc.cluster.local:8002/auth/verify"
                request_headers: ["Authorization"]
                upstream_headers: ["X-User-ID","X-User-Role","X-User-Plan"]

        upstreams:
          - id: 1
            name: tol-agent
            type: roundrobin
            nodes:
              "tol-agent.agent.svc.cluster.local:8001": 1
            timeout:
              connect: 5
              send: 300
              read: 300

          - id: 2
            name: tol-auth
            type: roundrobin
            nodes:
              "tol-auth.auth.svc.cluster.local:8002": 1
            timeout:
              connect: 5
              send: 10
              read: 10

          - id: 3
            name: tol-ingestion
            type: roundrobin
            nodes:
              "tol-ingestion.ingestion.svc.cluster.local:8003": 1
            timeout:
              connect: 5
              send: 60
              read: 120

          - id: 4
            name: tol-monitoring
            type: roundrobin
            nodes:
              "tol-monitoring.monitoring.svc.cluster.local:8004": 1
            timeout:
              connect: 5
              send: 10
              read: 10
        #END

  pluginAttr:
    prometheus:
      export_uri: /apisix/prometheus/metrics
      export_addr:
        ip: "0.0.0.0"
        port: 9091

admin:
  enabled: false

etcd:
  enabled: false

customPlugins:
  enabled: false
  luaPath: "/opt/apisix/?.lua"
  plugins: []

plugins:
  - openid-connect
  - forward-auth
  - limit-count
  - limit-req
  - prometheus
  - file-logger
  - proxy-rewrite
  - response-rewrite
  - cors
  - ip-restriction
  - real-ip

ingress:
  enabled: false

serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 10s
