image:
  repository: ghcr.io/tlarbi/tol-pg-backup
  tag: develop-latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

schedule: "0 2 * * *"
retentionDays: 7

s3:
  bucket: taxonline-datalake
  prefix: backups/postgres
  endpoint: https://s3.gra.io.cloud.ovh.net
  region: gra

vault:
  path:     taxonline/staging/backup
  storeRef: vault-backend

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "500m"
