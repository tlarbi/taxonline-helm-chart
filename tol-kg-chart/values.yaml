# =============================================================
# tol-knowledge-graph — Helm Values
# =============================================================

namespace: agent

# ── FalkorDB ──
falkordb:
  image:
    repository: falkordb/falkordb
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 6379
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""  # Use default

# ── tol-kg microservice ──
api:
  image:
    repository: harbor.taxonlineai.com/taxonline/tol-kg
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  port: 8003
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m

  env:
    FALKORDB_HOST: tol-knowledge-graph-falkordb
    FALKORDB_PORT: "6379"
    LEGAL_ETL_URL: "http://tol-legal-etl.agent.svc.cluster.local:8002"

# ── Vault / ExternalSecrets ──
externalSecret:
  enabled: true
  refreshInterval: 5m
  secretStore:
    kind: ClusterSecretStore
    name: vault-backend
  remoteRef:
    key: taxonline/dev/agent
  properties:
    - remoteProperty: DATABASE_URL
      secretKey: DATABASE_URL

