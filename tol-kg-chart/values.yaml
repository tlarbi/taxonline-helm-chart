replicaCount: 1

image:
  repository: ghcr.io/tlarbi/tol-kg
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8003

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "500m"
    memory: 512Mi

env:
  FALKORDB_HOST: "falkordb-staging.storage.svc.cluster.local"
  FALKORDB_PORT: "6379"
  QDRANT_HOST: "qdrant-staging.storage.svc.cluster.local"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "tol-corpus"

externalSecret:
  enabled: false

nameOverride: ""
fullnameOverride: ""
