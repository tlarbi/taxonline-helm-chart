apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: tol-kg
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.api.port }}
    targetPort: {{ .Values.api.port }}
    name: http
  selector:
    app.kubernetes.io/name: tol-kg
    app.kubernetes.io/instance: {{ .Release.Name }}

