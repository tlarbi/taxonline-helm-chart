apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace | default "tol-staging" }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          env:
            - name: QDRANT_HOST
              value: {{ .Values.env.QDRANT_HOST }}
            - name: QDRANT_PORT
              value: "{{ .Values.env.QDRANT_PORT }}"
            - name: QDRANT_COLLECTION
              value: {{ .Values.env.QDRANT_COLLECTION }}
            - name: BATCH_SIZE
              value: "{{ .Values.env.BATCH_SIZE }}"
            - name: POLL_SECONDS
              value: "{{ .Values.env.POLL_SECONDS }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tol-ingestion-secret
                  key: DATABASE_URL
