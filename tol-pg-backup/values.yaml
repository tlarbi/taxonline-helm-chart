image:
  repository: ghcr.io/tlarbi/tol-pg-backup
  tag: develop-latest
  pullPolicy: IfNotPresent

schedule: "0 2 * * *"
retentionDays: 7

s3:
  bucket: taxonline-datalake
  prefix: backups/postgres
  endpoint: https://s3.gra.io.cloud.ovh.net
  region: gra

# Where secrets come from — pulled via ExternalSecret from Vault.
vault:
  postgresPath: secret/data/taxonline/postgres
  s3Path:       secret/data/taxonline/s3
  storeRef:     vault-backend

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "500m"
