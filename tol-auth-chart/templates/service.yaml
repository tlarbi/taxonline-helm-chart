apiVersion: v1
kind: Service
metadata:
  name: {{ include "tol-auth.fullname" . }}
  labels:
    {{- include "tol-auth.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8002
      protocol: TCP
      name: http
  selector:
    {{- include "tol-auth.selectorLabels" . | nindent 4 }}

