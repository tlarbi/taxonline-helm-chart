replicaCount: 2

image:
  repository: harbor.taxonlineai.com/taxonline/tol-auth
  tag: "2.0.0"
  pullPolicy: Always

imagePullSecrets:
  - name: harbor-credentials

service:
  type: ClusterIP
  port: 8002

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  DEBUG: "false"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"

externalSecret:
  enabled: true
  refreshInterval: 5m
  secretStoreName: vault-backend
  secretStoreKind: ClusterSecretStore
  targetName: tol-auth-secrets
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: taxonline/dev/auth
        property: SECRET_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: taxonline/dev/auth
        property: DATABASE_URL

# ── Ingress ──────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /api/auth/$2
    nginx.ingress.kubernetes.io/service-upstream: "true"
  hosts:
    - host: rag.taxonlineai.com
      paths:
        - path: /api/auth(/|$)(.*)
          pathType: ImplementationSpecific
  tls:
    - secretName: taxonline-tls
      hosts:
        - rag.taxonlineai.com
