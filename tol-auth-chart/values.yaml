replicaCount: 2

image:
  repository: harbor.taxonlineai.com/taxonline/tol-auth
  tag: "2.12.0"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8002

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  DEBUG: "false"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"

externalSecret:
  enabled: true
  refreshInterval: 5m
  secretStoreName: vault-backend
  secretStoreKind: ClusterSecretStore
  targetName: tol-auth-secrets
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: taxonline/staging/auth
        property: SECRET_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: taxonline/staging/auth
        property: DATABASE_URL
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: taxonline/staging/auth
        property: KEYCLOAK_CLIENT_SECRET
    - secretKey: KEYCLOAK_ISSUER
      remoteRef:
        key: taxonline/staging/auth
        property: KEYCLOAK_ISSUER
    - secretKey: KEYCLOAK_CLIENT_ID
      remoteRef:
        key: taxonline/staging/auth
        property: KEYCLOAK_CLIENT_ID
    - secretKey: KEYCLOAK_TOKEN_URL
      remoteRef:
        key: taxonline/staging/auth
        property: KEYCLOAK_TOKEN_URL
    - secretKey: KEYCLOAK_JWKS_URL
      remoteRef:
        key: taxonline/staging/auth
        property: KEYCLOAK_JWKS_URL
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: taxonline/staging/auth
        property: RESEND_API_KEY

# ── Ingress ──────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: rag.taxonlineai.com
      paths:
        - path: /api/auth
          pathType: Prefix
  tls:
    - secretName: rag-tls
      hosts:
        - rag.taxonlineai.com
