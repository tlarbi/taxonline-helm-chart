{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "tol-ingestion.fullname" . }}
  labels:
    {{- include "tol-ingestion.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "tol-ingestion.selectorLabels" . | nindent 6 }}
{{- end }}

