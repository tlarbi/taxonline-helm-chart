{{- if .Values.backup.triggerFromIngestion }}
# Allows tol-ingestion to read the postgres-backup CronJob and create
# manual Jobs from its template (UI "Backup maintenant" button).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tol-ingestion-backup-trigger
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tol-ingestion-backup-trigger
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | default "tol-ingestion" }}
roleRef:
  kind: Role
  name: tol-ingestion-backup-trigger
  apiGroup: rbac.authorization.k8s.io
{{- end }}
