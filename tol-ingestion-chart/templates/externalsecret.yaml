{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tol-ingestion.fullname" . }}
  labels:
    {{- include "tol-ingestion.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    # Single source of truth — matches secret.yaml and deployment.yaml
    # which both use tol-ingestion.secretName. Previously hardcoded via
    # .Values.externalSecret.target.name which drifted from the helper
    # once fullnameOverride was introduced.
    name: {{ include "tol-ingestion.secretName" . }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        property: {{ .remoteRef.property }}
    {{- end }}
{{- end }}

