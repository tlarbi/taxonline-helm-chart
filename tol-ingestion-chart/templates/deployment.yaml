apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tol-ingestion.fullname" . }}
  labels:
    {{- include "tol-ingestion.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  {{- end }}
  selector:
    matchLabels:
      {{- include "tol-ingestion.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "tol-ingestion.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "tol-ingestion.fullname" . }}-config
            - secretRef:
                name: {{ include "tol-ingestion.secretName" . }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.documentAi.enabled }}
          # ── Google Document AI credentials (Sprint 9) ─────────
          # Le SDK google-cloud-documentai lit la clé depuis le
          # fichier pointé par GOOGLE_APPLICATION_CREDENTIALS (voir
          # configmap). On matérialise la clé `DOCUMENT_AI_CREDENTIALS_JSON`
          # du Secret en fichier, projetée en readOnly + mode 0400.
          volumeMounts:
            - name: google-credentials
              mountPath: {{ .Values.documentAi.mountPath | default "/var/secrets/google" }}
              readOnly: true
          {{- end }}
      {{- if .Values.documentAi.enabled }}
      volumes:
        - name: google-credentials
          secret:
            secretName: {{ include "tol-ingestion.secretName" . }}
            items:
              - key: DOCUMENT_AI_CREDENTIALS_JSON
                path: credentials.json
            defaultMode: 0400
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
