replicaCount: 1

image:
  repository: ghcr.io/tlarbi/tol-ingestion
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8003

# ── Ingress — désactivé intentionnellement ────────────────────────
# tol-ingestion N'EST PAS exposé directement à l'internet.
# Les requêtes /api/v2/ingestion/* arrivent via tol-agent (BFF proxy).
# Cela évite de dupliquer les annotations external-auth et body-size.
ingress:
  enabled: false

# ── External Secrets (HashiCorp Vault) ───────────────────────────
# The target Secret name is derived from the tol-ingestion.secretName
# helper (same as deployment.yaml and secret.yaml). It resolves to:
#   {{ include "tol-ingestion.fullname" . }}-secrets
# which, with fullnameOverride: tol-ingestion-staging, produces
#   tol-ingestion-staging-secrets
# — i.e. the exact name the Deployment's envFrom reaches for.
#
# NOTE: The actual `data` list for each environment lives in the
# gitops values file (taxonline-gitops/charts/{env}/tol-ingestion-values.yaml).
# The block below is just a default/fallback for envs without a gitops override.
externalSecret:
  enabled: true
  secretStoreName: vault-backend
  secretStoreKind: ClusterSecretStore
  refreshInterval: 1h
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: taxonline/staging/ingestion
        property: SECRET_KEY
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: taxonline/staging/ingestion
        property: S3_ACCESS_KEY
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: taxonline/staging/ingestion
        property: S3_SECRET_KEY
    - secretKey: OPENSEARCH_PASS
      remoteRef:
        key: taxonline/staging/ingestion
        property: OPENSEARCH_PASS
    - secretKey: DATABASE_URL
      remoteRef:
        key: taxonline/staging/ingestion
        property: DATABASE_URL

# ── Application Config (non-sensitive) ───────────────────────────
config:
  DEBUG: "false"
  S3_ENDPOINT: "https://s3.gra.io.cloud.ovh.net"
  S3_BUCKET: "taxonline-datalake"
  S3_REGION: "gra"
  QDRANT_HOST: "qdrant.vector.svc.cluster.local"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "tol-docs-v3"
  TOL_EMBED_URL: "http://tol-embed.embedding.svc.cluster.local:8000"
  OPENSEARCH_HOST: "opensearch-cluster-master.opensearch.svc.cluster.local"
  OPENSEARCH_PORT: "9200"
  OPENSEARCH_USER: "admin"
  OPENSEARCH_SSL: "true"
  OPENSEARCH_INDEX: "taxonline"
  OPENSEARCH_ENABLED: "true"
  EMBED_MODEL: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
  EMBED_DIM: "768"

# ── Google Document AI mount (Sprint 9 OCR) ──────────────────────
# Default = false (chart is safe in envs without OCR active).
# Gitops values files turn this on per-env (e.g. staging: enabled=true).
# When enabled, deployment.yaml projects DOCUMENT_AI_CREDENTIALS_JSON
# from the K8s Secret as a file at mountPath/credentials.json, and
# the google-cloud-documentai SDK reads it via
# GOOGLE_APPLICATION_CREDENTIALS (set in the gitops config block).
documentAi:
  enabled: false
  mountPath: /var/secrets/google

resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 3Gi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 60
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 5

# ── Network Policy ────────────────────────────────────────────────
networkPolicy:
  enabled: false
  ingress:
    - from:
        # FIX: APISIX supprimé — tol-agent (BFF proxy) est l'unique appelant
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent
      ports:
        - port: 8003
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vector
      ports:
        - port: 6333
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: opensearch
      ports:
        - port: 9200
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: embedding
      ports:
        - port: 8000
    - to: []
      ports:
        - port: 53
          protocol: UDP
    - to: []
      ports:
        - port: 443

serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 15s
  path: /metrics
  labels:
    release: tol-monitoring

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

jobs:
  resetFailed:
    enabled: false

  # ─────────────────────────────────────────────────────────────────
  # S3 bucket CORS configuration (post-install/post-upgrade helm hook).
  # Idempotent: the Job skips the write when the live bucket already
  # matches the declared spec, so it's safe to leave enabled.
  #
  # Override `allowedOrigins` per-environment in gitops values files.
  # ─────────────────────────────────────────────────────────────────
  s3Cors:
    enabled: true
    allowedOrigins:
      - "https://rag.taxonlineai.com"
      - "https://legal-taxonline.com"
      - "https://chat.taxonlineai.com"
    allowedMethods:
      - PUT
      - GET
      - HEAD
    maxAgeSeconds: 3000
