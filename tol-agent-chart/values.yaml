replicaCount: 2

image:
  repository: ghcr.io/tlarbi/tol-agent
  tag: "8.2.3"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8001

resources:
  requests:
    cpu: 200m
    memory: 2Gi
  limits:
    cpu: "1"
    memory: 2Gi

# ── Application Config (non-secret) ──────────────────────────────
env:
  # Qdrant
  QDRANT_HOST: "qdrant-staging.storage.svc.cluster.local"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "tol-docs-v3"
  QDRANT_TOP_K: "20"
  RERANKER_ENABLED: "false"
  TOL_EMBED_URL: "http://tol-embed-staging.tol-staging.svc.cluster.local:8000"
  # OpenSearch
  OPENSEARCH_HOST: "opensearch-staging.storage.svc.cluster.local"
  OPENSEARCH_PORT: "9200"
  OPENSEARCH_INDEX: "taxonline_v2"
  OPENSEARCH_USER: "admin"
  # Ollama
  OLLAMA_HOST: "ollama.ollama.svc.cluster.local"
  OLLAMA_PORT: "11434"
  EMBED_MODEL: "nomic-embed-text"
  # LLM Tiering
  LLM_PROVIDER: "groq"
  LLM_ROUTING_MODEL: "llama-3.1-8b-instant"
  LLM_GENERATION_MODEL: "llama-3.3-70b-versatile"
  LLM_FALLBACK_MODEL: "mistral"
  # Redis
  REDIS_HOST: "redis.agent.svc.cluster.local"
  REDIS_PORT: "6379"
  # App
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  LITELLM_LOCAL_MODEL_COST_MAP: "True"
  # BFF — URL interne pour proxy vers tol-ingestion
  TOL_INGESTION_URL: "http://tol-ingestion.ingestion.svc.cluster.local:8003"
  GRAPH_GRAPH_ENRICHMENT_ENABLED: "false"

# ── External Secrets (ESO → Vault) ───────────────────────────────
externalSecret:
  enabled: true
  refreshInterval: 5m
  secretStoreName: vault-backend
  secretStoreKind: ClusterSecretStore
  targetName: tol-agent-secrets
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: taxonline/staging/agent
        property: SECRET_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: taxonline/staging/agent
        property: DATABASE_URL
    - secretKey: OPENSEARCH_PASS
      remoteRef:
        key: taxonline/staging/agent
        property: OPENSEARCH_PASS
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: taxonline/staging/agent
        property: GROQ_API_KEY
    # LLM_API_KEY = alias de GROQ_API_KEY (utilisé par le code Python)
    - secretKey: LLM_API_KEY
      remoteRef:
        key: taxonline/staging/agent
        property: GROQ_API_KEY
    - secretKey: REDIS_URL
      remoteRef:
        key: taxonline/staging/agent
        property: REDIS_URL
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: taxonline/staging/agent
        property: TAVILY_API_KEY
    - secretKey: OPIK_API_KEY
      remoteRef:
        key: taxonline/staging/agent
        property: OPIK_API_KEY
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: taxonline/staging/agent
        property: S3_ACCESS_KEY
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: taxonline/staging/agent
        property: S3_SECRET_KEY
    - secretKey: S3_BUCKET
      remoteRef:
        key: taxonline/staging/agent
        property: S3_BUCKET
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: taxonline/staging/agent
        property: S3_ENDPOINT
    - secretKey: S3_REGION
      remoteRef:
        key: taxonline/staging/agent
        property: S3_REGION
    # Claude Sonnet — traduction juridique
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: taxonline/staging/agent
        property: ANTHROPIC_API_KEY

# ── Network Policy ────────────────────────────────────────────────
networkPolicy:
  enabled: false
  allowedNamespaces:
    - vector       # Qdrant
    - opensearch   # OpenSearch
    - ollama       # Ollama + Redis
    - database     # PostgreSQL
    - auth         # tol-auth
    - ingestion    # tol-ingestion (BFF proxy)

# ── Proxy ─────────────────────────────────────────────────────────
proxy:
  http_proxy: "http://10.42.0.1:3128"
  https_proxy: "http://10.42.0.1:3128"
  no_proxy: "localhost,127.0.0.1,10.42.0.0/16,10.43.0.0/16,.svc,.svc.cluster.local"

# ── Ingress api.taxonlineai.com ────────────────────────────────────
ingress:
  enabled: false
  host: api.taxonlineai.com
  tlsSecret: api-taxonlineai-tls
  auth:
    enabled: true
    url: "http://tol-auth-staging.tol-staging.svc.cluster.local:8000/auth/verify"
    responseHeaders: "X-User-ID,X-User-Role,X-User-Plan"

# ── Ingress rag.taxonlineai.com ────────────────────────────────────
ingressRag:
  enabled: true
  host: rag.taxonlineai.com
  path: /api
  tlsSecret: rag-tls
  proxyBodySize: "50m"
  proxyReadTimeout: "300"
  proxySendTimeout: "300"

# ── Proxy overrides ────────────────────────────────────────────────
proxyOverrides:
  noProxy: "localhost,127.0.0.1,10.42.0.0/16,10.43.0.0/16,.svc,.svc.cluster.local,api.groq.com,huggingface.co,api.anthropic.com"
