apiVersion: apps/v1
kind: Deployment
metadata:
  name: tol-app-{{ .Release.Name }}
  labels:
    app: tol-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: tol-app
  template:
    metadata:
      labels:
        app: tol-app
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tol-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
