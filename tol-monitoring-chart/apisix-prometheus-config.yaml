# =============================================================================
# Apache APISIX - Prometheus Plugin Configuration
# Add to your existing APISIX config.yaml or Helm values
# =============================================================================

# ---- In config.yaml (standalone) ----
# plugin_attr:
#   prometheus:
#     export_uri: /apisix/prometheus/metrics
#     export_addr:
#       ip: 0.0.0.0
#       port: 9091
#     # Per-route metrics
#     metrics:
#       http_status:
#         extra_labels:
#           - upstream_addr: $upstream_addr
#       http_latency:
#         extra_labels: []
#       bandwidth:
#         extra_labels: []

# ---- In APISIX Helm values (apisix-values.yaml) ----
apisix:
  # Enable prometheus plugin globally
  plugins:
    - prometheus
    - limit-req
    - limit-count
    - limit-conn
    - key-auth
    - jwt-auth
    - cors
    - proxy-rewrite
    - response-rewrite
    - redirect

  pluginAttrs:
    prometheus:
      export_uri: /apisix/prometheus/metrics
      export_addr:
        ip: "0.0.0.0"
        port: 9091

  # Enable data plane metrics
  dataPlane:
    metrics:
      enabled: true

# Expose metrics port
service:
  type: ClusterIP
  metricsPort: 9091

# ServiceMonitor for auto-discovery by Prometheus Operator
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 10s
  path: /apisix/prometheus/metrics
  port: 9091
  labels:
    release: tol-monitoring

