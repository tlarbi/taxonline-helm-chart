# =============================================================================
# TaxOnline AI - Monitoring Stack Helm Values
# Chart: kube-prometheus-stack (v65.x)
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm install tol-monitoring prometheus-community/kube-prometheus-stack \
#   -f monitoring-values.yaml -n monitoring --create-namespace
# =============================================================================

nameOverride: "tol-monitoring"
fullnameOverride: "tol-monitoring"

# ---- Prometheus ----
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 30d
    retentionSize: "20GB"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi

    # Custom scrape configs for TaxOnline services
    additionalScrapeConfigs:
      # APISIX Gateway
      - job_name: "apisix"
        scrape_interval: 10s
        metrics_path: /apisix/prometheus/metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["taxonline"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: apisix
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "${1}:9091"

      # tol-agent
      - job_name: "tol-agent"
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["taxonline"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: tol-agent
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "${1}:8000"

      # tol-auth
      - job_name: "tol-auth"
        scrape_interval: 15s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["taxonline"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: tol-auth
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "${1}:8001"

      # Qdrant
      - job_name: "qdrant"
        scrape_interval: 30s
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["taxonline"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: qdrant
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "${1}:6333"

      # Redis
      - job_name: "redis"
        scrape_interval: 15s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["taxonline"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: redis-exporter
            action: keep

    # Alert rules
    additionalRuleFiles:
      - "/etc/prometheus/rules/*.yml"

  # ServiceMonitor auto-discovery
  serviceMonitorSelectorNilUsesHelmValues: false
  podMonitorSelectorNilUsesHelmValues: false

# ---- Grafana ----
grafana:
  enabled: true
  replicas: 1

  plugins: []

  initChownData:
    enabled: false

  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  persistence:
    enabled: false

  admin:
    existingSecret: "tol-grafana-admin"
    userKey: admin-user
    passwordKey: admin-password

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

  # Ingress via APISIX
  ingress:
    enabled: false
    ingressClassName: apisix
    annotations:
      k8s.apisix.apache.org/ssl-redirect: "true"
    hosts:
      - monitoring.taxonline.ai
    tls:
      - secretName: tol-monitoring-tls
        hosts:
          - monitoring.taxonline.ai

  # Dashboard provisioning
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "TaxOnline AI"
          orgId: 1
          folder: "TaxOnline AI"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/taxonline

  dashboardsConfigMaps:
    taxonline: "tol-grafana-dashboards"


  # Grafana.ini overrides
  grafana.ini:
    server:
      root_url: https://monitoring.taxonline.ai
    auth:
      disable_login_form: false
    auth.anonymous:
      enabled: false
    security:
      admin_user: admin
    users:
      allow_sign_up: false


# ---- AlertManager ----
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        - match:
            severity: critical
          receiver: "critical-alerts"
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: "warning-alerts"
          repeat_interval: 4h

    receivers:
      - name: "default"
        webhook_configs:
          - url: "http://alertmanager-webhook:9095/webhook"
      - name: "critical-alerts"
        webhook_configs:
          - url: "http://alertmanager-webhook:9095/webhook"
            send_resolved: true
        # Uncomment when ready:
        # slack_configs:
        #   - api_url: '<vault:secret/taxonline/slack#webhook_url>'
        #     channel: '#tol-alerts-critical'
        #     title: '🚨 {{ .GroupLabels.alertname }}'
        #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
      - name: "warning-alerts"
        webhook_configs:
          - url: "http://alertmanager-webhook:9095/webhook"

# ---- Node Exporter ----
nodeExporter:
  enabled: true

# ---- Kube State Metrics ----
kubeStateMetrics:
  enabled: true

# ---- Disable unused components ----
kubeApiServer:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
