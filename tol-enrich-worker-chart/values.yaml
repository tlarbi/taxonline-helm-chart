image:
  repository: ghcr.io/tlarbi/tol-enrich-worker
  tag: develop-latest

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  QDRANT_HOST: "qdrant-staging.storage.svc.cluster.local"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "tol-corpus"
  AUTH_INTERNAL_URL: "http://tol-auth-staging.tol-staging.svc.cluster.local:8000"
  BATCH_SIZE: "5"
  POLL_SECONDS: "5"
  RATE_LIMIT_RPM: "50"
  MAX_ATTEMPTS: "3"
  STALE_MINUTES: "5"
  ALIAS_CACHE_SECONDS: "60"
  CLAUDE_MODEL: "claude-haiku-4-5-20251001"
  CLAUDE_MAX_TOKENS: "500"
  CLAUDE_INPUT_USD_PER_1M: "1.0"
  CLAUDE_OUTPUT_USD_PER_1M: "5.0"
