apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace | default "tol-staging" }}
spec:
  replicas: 1
  strategy:
    # Recreate au lieu de RollingUpdate : un seul worker à la fois.
    # FOR UPDATE SKIP LOCKED gère la cohérence, c'est juste plus propre au rollout.
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          env:
            - name: QDRANT_HOST
              value: {{ .Values.env.QDRANT_HOST }}
            - name: QDRANT_PORT
              value: "{{ .Values.env.QDRANT_PORT }}"
            - name: QDRANT_COLLECTION
              value: {{ .Values.env.QDRANT_COLLECTION }}
            - name: AUTH_INTERNAL_URL
              value: {{ .Values.env.AUTH_INTERNAL_URL }}
            - name: BATCH_SIZE
              value: "{{ .Values.env.BATCH_SIZE }}"
            - name: POLL_SECONDS
              value: "{{ .Values.env.POLL_SECONDS }}"
            - name: RATE_LIMIT_RPM
              value: "{{ .Values.env.RATE_LIMIT_RPM }}"
            - name: MAX_ATTEMPTS
              value: "{{ .Values.env.MAX_ATTEMPTS }}"
            - name: STALE_MINUTES
              value: "{{ .Values.env.STALE_MINUTES }}"
            - name: ALIAS_CACHE_SECONDS
              value: "{{ .Values.env.ALIAS_CACHE_SECONDS }}"
            - name: CLAUDE_MODEL
              value: {{ .Values.env.CLAUDE_MODEL }}
            - name: CLAUDE_MAX_TOKENS
              value: "{{ .Values.env.CLAUDE_MAX_TOKENS }}"
            - name: CLAUDE_INPUT_USD_PER_1M
              value: "{{ .Values.env.CLAUDE_INPUT_USD_PER_1M }}"
            - name: CLAUDE_OUTPUT_USD_PER_1M
              value: "{{ .Values.env.CLAUDE_OUTPUT_USD_PER_1M }}"
            # ── Secrets depuis le secret partagé tol-ingestion-staging-secrets ──
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tol-ingestion-staging-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tol-ingestion-staging-secrets
                  key: ANTHROPIC_API_KEY
