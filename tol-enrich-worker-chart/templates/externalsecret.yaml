{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tol-enrich-worker.fullname" . }}-secrets
  labels:
    {{- include "tol-enrich-worker.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRefName }}
    kind: {{ .Values.externalSecrets.secretStoreRefKind }}
  target:
    name: {{ include "tol-enrich-worker.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.anthropic.remoteKey }}
        property: {{ .Values.externalSecrets.remoteRefs.anthropic.property }}
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.database.remoteKey }}
        property: {{ .Values.externalSecrets.remoteRefs.database.property }}
{{- end }}
