# =============================================================
# tol-legal-etl — Helm Values
# =============================================================

replicaCount: 1

image:
  repository: harbor.taxonlineai.com/taxonline/tol-legal-etl
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8002

# ── Environment ──
env:
  QDRANT_HOST: qdrant.vector.svc.cluster.local
  QDRANT_PORT: "6333"

# ── Resources ──
resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 500m

# ── Probes ──
livenessProbe:
  httpGet:
    path: /health
    port: 8002
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /ready
    port: 8002
  initialDelaySeconds: 5
  periodSeconds: 10

# ── Vault / ExternalSecrets ──
externalSecret:
  enabled: true
  refreshInterval: 5m
  secretStore:
    kind: ClusterSecretStore
    name: vault-backend
  remoteRef:
    key: taxonline/dev/agent
  properties:
    - remoteProperty: DATABASE_URL
      secretKey: DATABASE_URL

# ── CronJob: scheduled ETL re-sync ──
cronjob:
  enabled: true
  schedule: "0 3 * * 0"  # Every Sunday 3 AM
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1000m

# ── Namespace ──
namespace: agent

