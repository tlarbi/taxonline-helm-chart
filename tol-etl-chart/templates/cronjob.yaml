{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-sync
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: etl-sync
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: etl-sync
        spec:
          restartPolicy: Never
          containers:
          - name: etl-trigger
            image: curlimages/curl:latest
            command:
            - sh
            - -c
            - |
              echo "Triggering ETL on {{ .Release.Name }}:{{ .Values.service.port }}..."
              RESPONSE=$(curl -sf -X POST \
                http://{{ .Release.Name }}.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.service.port }}/etl/run \
                -H "Content-Type: application/json" \
                --max-time 1800)
              echo "Response: $RESPONSE"
              echo "$RESPONSE" | grep -q '"status":"success"' && exit 0 || exit 1
            resources:
              requests:
                memory: 32Mi
                cpu: 10m
              limits:
                memory: 64Mi
                cpu: 50m
{{- end }}

